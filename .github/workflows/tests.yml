
name: Тесты

on:
  push:                        
    branches: [ "master" ]      

jobs:
  test:                        
    runs-on: ubuntu-latest     
    
    steps:                     
    
      - name: Скачать код
        uses: actions/checkout@v4 
        
      - name: Установить g++
        run: sudo apt-get install -y build-essential 
        
      - name: Собрать и запустить тесты
        run: make  